name: Build ACESATAI

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: ACESATAI Build ${{ github.run_number }}
          draft: false
          files: android/app/build/outputs/apk/release/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build iOS
        run: |
          xcodebuild -workspace ios/acesataiapp.xcworkspace \
            -scheme acesataiapp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath /tmp/ACESATAI.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive 2>&1 | tail -5

      - name: Create IPA
        run: |
          cd /tmp/ACESATAI.xcarchive/Products/Applications 2>/dev/null || true
          mkdir -p Payload
          cp -R *.app Payload/ 2>/dev/null || true
          zip -r /tmp/ACESATAI.ipa Payload/ 2>/dev/null || true

      - name: Upload IPA
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          tag_name: build-${{ github.run_number }}
          name: ACESATAI Build ${{ github.run_number }}
          draft: false
          files: /tmp/ACESATAI.ipa
